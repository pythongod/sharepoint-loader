name: Publish to Chrome Web Store

on:
  workflow_run:
    workflows: [Release]
    types: [completed]
  workflow_dispatch:
    inputs:
      use_latest_release:
        description: Use the latest GitHub Release
        type: boolean
        default: true
      release_tag:
        description: Release tag (when not using latest)
        type: string
        required: false
      publish_target:
        description: Web Store publication target
        type: choice
        default: default
        options: [default, trustedTesters]
      skip_upload:
        description: Publish the package already staged in the Web Store
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
      CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
      CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
      REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
      PUBLISH_TARGET: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_target || 'default' }}
      SKIP_UPLOAD: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_upload || false }}
    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      - name: Resolve release
        env:
          USE_LATEST: ${{ inputs.use_latest_release }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == workflow_run ]]; then
            RELEASE_TAG="v$(jq -er .version manifest.json)"
          elif [[ "$USE_LATEST" == true ]]; then
            RELEASE_TAG="$(gh release view --repo "$GITHUB_REPOSITORY" --json tagName --jq .tagName)"
          else
            RELEASE_TAG="$REQUESTED_TAG"
          fi
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || { echo "Invalid release tag: $RELEASE_TAG" >&2; exit 1; }
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "ZIP_ASSET_NAME=sharepoint-loader-${RELEASE_TAG}.zip" >> "$GITHUB_ENV"
      - name: Download exact release asset
        run: |
          asset_id="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" --jq ".assets | map(select(.name == \"$ZIP_ASSET_NAME\")) | if length == 1 then .[0].id else error(\"expected exactly one matching asset\") end")"
          gh api "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" -H 'Accept: application/octet-stream' > extension.zip
      - name: Verify release package
        run: |
          unzip -t extension.zip
          entries="$(unzip -Z1 extension.zip)"
          grep -Fxq manifest.json <<<"$entries" || { echo 'manifest.json is not at the archive root.' >&2; exit 1; }
          grep -Fxq src/content.js <<<"$entries" || { echo 'src/content.js is missing.' >&2; exit 1; }
          ! grep -Eq '(^|/)sharepoint-loader/manifest\.json$' <<<"$entries" || { echo 'Nested extension package rejected.' >&2; exit 1; }
          unzip -p extension.zip manifest.json > /tmp/archived-manifest.json
          jq -e . /tmp/archived-manifest.json >/dev/null
          test "$(jq -r .version /tmp/archived-manifest.json)" = "${RELEASE_TAG#v}" || { echo 'Archived version does not match release tag.' >&2; exit 1; }
          test "$(jq -r .manifest_version /tmp/archived-manifest.json)" = 3 || { echo 'Archived extension is not Manifest V3.' >&2; exit 1; }
          jq -e '[.content_scripts[].matches[] | test("^https://\\*\\.sharepoint\\.(com|cn|de|us)/\\*$")] | all' /tmp/archived-manifest.json >/dev/null || { echo 'Non-SharePoint content-script match rejected.' >&2; exit 1; }
          rm -f /tmp/archived-manifest.json
      - name: Authenticate, upload, and publish
        run: |
          for pair in EXTENSION_ID:"$EXTENSION_ID" CLIENT_ID:"$CLIENT_ID" CLIENT_SECRET:"$CLIENT_SECRET" REFRESH_TOKEN:"$REFRESH_TOKEN"; do
            name="${pair%%:*}"; value="${pair#*:}"
            test -n "$value" || { echo "Required Chrome secret $name is missing." >&2; exit 1; }
          done
          token_response="$(mktemp)"; api_response="$(mktemp)"
          trap 'rm -f "$token_response" "$api_response"' EXIT
          token_status="$(curl --silent --show-error -o "$token_response" -w '%{http_code}' -X POST https://oauth2.googleapis.com/token \
            --data-urlencode client_id="$CLIENT_ID" --data-urlencode client_secret="$CLIENT_SECRET" \
            --data-urlencode refresh_token="$REFRESH_TOKEN" --data-urlencode grant_type=refresh_token)"
          if [[ ! "$token_status" =~ ^2 ]]; then
            code="$(jq -r '.error // "unknown_error"' "$token_response" 2>/dev/null || echo unknown_error)"
            description="$(jq -r '.error_description // "No OAuth error description supplied"' "$token_response" 2>/dev/null || echo 'No OAuth error description supplied')"
            echo "OAuth token exchange failed (HTTP $token_status): $code: $description" >&2
            [[ "$code" != invalid_client ]] || echo 'CHROME_CLIENT_ID and CHROME_CLIENT_SECRET must belong to the same active OAuth client, and CHROME_REFRESH_TOKEN must have been created with that client.' >&2
            exit 1
          fi
          ACCESS_TOKEN="$(jq -er '.access_token | select(type == "string" and length > 0)' "$token_response")" || { echo 'OAuth response did not contain a valid access token.' >&2; exit 1; }
          if [[ "$SKIP_UPLOAD" != true ]]; then
            upload_status="$(curl --silent --show-error -o "$api_response" -w '%{http_code}' -X PUT \
              "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${EXTENSION_ID}" \
              -H "Authorization: Bearer $ACCESS_TOKEN" -H 'x-goog-api-version: 2' -H 'Content-Type: application/zip' --data-binary @extension.zip)"
            if [[ ! "$upload_status" =~ ^2 ]] || ! jq -e '.uploadState == "SUCCESS"' "$api_response" >/dev/null; then
              echo "Chrome Web Store upload failed (HTTP $upload_status)." >&2
              jq -c '{uploadState, itemError}' "$api_response" >&2 2>/dev/null || true
              exit 1
            fi
          fi
          publish_status="$(curl --silent --show-error -o "$api_response" -w '%{http_code}' -X POST \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${EXTENSION_ID}/publish" \
            -H "Authorization: Bearer $ACCESS_TOKEN" -H 'x-goog-api-version: 2' -H 'Content-Type: application/json' \
            --data "{\"target\":\"${PUBLISH_TARGET}\"}")"
          if [[ ! "$publish_status" =~ ^2 ]] || ! jq -e '.status | index("OK") != null' "$api_response" >/dev/null; then
            echo "Chrome Web Store publication failed (HTTP $publish_status)." >&2
            jq -c '{status, statusDetail}' "$api_response" >&2 2>/dev/null || true
            [[ "$SKIP_UPLOAD" == true ]] || echo 'The upload succeeded. Resolve listing/review issues, then rerun with skip_upload=true.' >&2
            exit 1
          fi
          echo 'Chrome Web Store publication request succeeded.'
      - name: Write publication summary
        if: always()
        run: |
          {
            echo '## Chrome Web Store publication'
            echo "- Asset: \`${ZIP_ASSET_NAME:-unresolved}\`"
            echo "- Release: \`${RELEASE_TAG:-unresolved}\`"
            echo "- Target: \`${PUBLISH_TARGET}\`"
            echo "- Status: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Send optional Telegram notification
        if: always()
        continue-on-error: true
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: |
          if [[ -z "$BOT_TOKEN" || -z "$CHAT_ID" ]]; then echo 'Telegram is not configured; skipping notification.'; exit 0; fi
          if [[ '${{ job.status }}' == success ]]; then icon='✅'; result=succeeded; else icon='❌'; result=failed; fi
          listing="https://chromewebstore.google.com/detail/${EXTENSION_ID}"
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          message="$icon SharePoint Loader Chrome Web Store publication $result
          📦 ${ZIP_ASSET_NAME:-unresolved}
          🏷️ ${RELEASE_TAG:-unresolved}
          🎯 $PUBLISH_TARGET
          🏪 $listing
          🔗 $run_url"
          args=(--fail-with-body --silent --show-error -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d chat_id="$CHAT_ID" --data-urlencode text="$message")
          [[ -z "$THREAD_ID" ]] || args+=(-d message_thread_id="$THREAD_ID")
          response="$(mktemp)"; trap 'rm -f "$response"' EXIT
          curl "${args[@]}" >"$response"
          jq -e '.ok == true' "$response" >/dev/null || { jq -r '.description // "Telegram rejected the request"' "$response" >&2; exit 1; }
