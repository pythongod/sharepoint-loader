name: Test Telegram notification

on: workflow_dispatch

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
        run: |
          test -n "$BOT_TOKEN" || { echo 'TELEGRAM_BOT_TOKEN is required.' >&2; exit 1; }
          test -n "$CHAT_ID" || { echo 'TELEGRAM_CHAT_ID is required.' >&2; exit 1; }
          args=(--fail-with-body --silent --show-error -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" -d chat_id="$CHAT_ID" --data-urlencode "text=SharePoint Loader notification test
          Repository: $GITHUB_REPOSITORY
          Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          [[ -z "$THREAD_ID" ]] || args+=(-d message_thread_id="$THREAD_ID")
          response="$(mktemp)"; trap 'rm -f "$response"' EXIT
          if ! curl "${args[@]}" >"$response"; then jq -r '.description // "Telegram request failed"' "$response" >&2; exit 1; fi
          jq -e '.ok == true' "$response" >/dev/null || { jq -r '.description // "Telegram rejected the request"' "$response" >&2; exit 1; }
